name: CI/CD - Build, Scan, Push, and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_to_cluster:
        description: Deploy the pushed image to Kubernetes from the self-hosted runner
        required: false
        type: boolean
        default: false
      environment:
        description: GitHub environment used for deployment approval gates
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: wallet-api
  GO_VERSION: "1.26.x"

jobs:
  ci:
    name: CI - Test, Scan, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download Go dependencies
        run: go mod download

      - name: Check Go formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Verify Go modules are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests with race detector and coverage
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          if-no-files-found: ignore
          retention-days: 14

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ${{ env.GO_VERSION }}
          go-package: ./...
          repo-checkout: false

      - name: Build Docker image locally for CI validation
        run: docker build -t ${{ env.IMAGE_NAME }}:ci .

      - name: Scan Docker image for high and critical vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  dockerhub:
    name: CD - Push Docker Image to Docker Hub
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request'
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_USERNAME"
          test -n "$DOCKERHUB_TOKEN"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=tag

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  deploy:
    name: CD - Deploy to Kubernetes from self-hosted runner
    runs-on: [self-hosted, wallet-deploy]
    needs: dockerhub
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_to_cluster == true
    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Verify self-hosted runner tools
        run: |
          kubectl version --client=true

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          if [ -n "$KUBE_CONFIG_B64" ]; then
            kubeconfig="$RUNNER_TEMP/kubeconfig"
            if ! echo "$KUBE_CONFIG_B64" | base64 --decode > "$kubeconfig" 2>/dev/null; then
              echo "$KUBE_CONFIG_B64" | base64 -D > "$kubeconfig"
            fi
            chmod 600 "$kubeconfig"
            echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"
            echo "Using kubeconfig from KUBE_CONFIG_B64"
          elif [ -f "$HOME/.kube/config" ]; then
            echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"
            echo "Using existing kubeconfig from self-hosted runner"
          else
            echo "No kubeconfig found. Set KUBE_CONFIG_B64 or configure ~/.kube/config on the self-hosted runner."
            exit 1
          fi

      - name: Check Kubernetes access
        run: |
          kubectl config current-context
          kubectl get namespace wallet-demo --ignore-not-found

      - name: Validate Kubernetes manifests
        run: kubectl apply --dry-run=client -f deploy/k8s/

      - name: Apply Kubernetes manifests
        run: kubectl apply -f deploy/k8s/

      - name: Deploy image by digest
        env:
          IMAGE_REF: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}@${{ needs.dockerhub.outputs.digest }}
        run: |
          kubectl -n wallet-demo set image deployment/wallet-api wallet-api="$IMAGE_REF"
          kubectl -n wallet-demo annotate deployment/wallet-api wallet.devops-lab/image-digest="${{ needs.dockerhub.outputs.digest }}" --overwrite
          kubectl -n wallet-demo rollout status deployment/wallet-api --timeout=180s
          kubectl -n wallet-demo get deployment wallet-api -o wide
